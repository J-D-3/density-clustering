name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # Backend matrix (issue #43): the "backend matrix" unit test instantiates
  # compute_reachability_dists with both NanoflannBackend and ApproxNanoflannBackend, so
  # the approximate path is built and exercised in every job below (all 3 OSes). The
  # exact BoostRTreeBackend path is compiled and asserted bit-identical in the
  # build-test-boost job (which enables OPTICS_ENABLE_BOOST_RTREE). No separate approx
  # job is needed -- it would only re-run the same suite.
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            preset: linux-gcc
            werror: "OFF"
          - name: Linux Clang
            os: ubuntu-latest
            preset: linux-clang
            werror: "OFF"
          - name: Windows MSVC
            # Pinned: the `msvc` preset uses the "Visual Studio 17 2022" generator (matching the
            # documented MSVC 2022 toolchain), which the windows-latest image no longer provides
            # since it moved to VS2026 -- cmake then fails at project(). windows-2022 keeps CI and
            # local dev on the same generator. Bump the preset + this image together when moving to VS2026.
            os: windows-2022
            preset: msvc
            werror: "ON"
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DOPTICS_WARNINGS_AS_ERRORS=${{ matrix.werror }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  build-test-boost:
    name: Linux GCC + Boost backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Boost
        run: sudo apt-get update && sudo apt-get install -y libboost-dev

      - name: Configure (Boost backend enabled)
        run: cmake --preset linux-gcc -DOPTICS_ENABLE_BOOST_RTREE=ON

      - name: Build
        run: cmake --build --preset linux-gcc

      - name: Test
        run: ctest --preset linux-gcc

  python-binding:
    name: Python binding (pybind11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install pybind11 numpy

      - name: Configure (binding only)
        run: >
          cmake -S . -B build-py -DOPTICS_BUILD_PYTHON=ON
          -DOPTICS_BUILD_TESTS=OFF -DOPTICS_BUILD_EXAMPLES=OFF
          -Dpybind11_DIR=$(python -m pybind11 --cmakedir)

      - name: Build
        run: cmake --build build-py

      - name: Smoke test
        # The in-tree build drops _optics.*.so under build-py/python; the native smoke test imports
        # it from that dir (argv[1]). (Was python/test_optics_py.py, moved to python/tests/ in the
        # test reorg.)
        run: python python/tests/test_native.py build-py/python

  sanitizers:
    name: Linux Clang ASan+UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (ASan + UBSan)
        run: >
          cmake -S . -B build-san -G "Unix Makefiles"
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"

      - name: Build
        run: cmake --build build-san

      - name: Test (sanitizers halt on first error)
        run: ctest --test-dir build-san --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  hnsw-backend:
    name: Linux GCC + HNSW backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # HnswBackend ships behind OPTICS_ENABLE_HNSW (vendored hnswlib) and is OFF by default, so
      # the default jobs above never compile or exercise it. This job builds it and runs the gated
      # HnswBackend unit test (recall + end-to-end clustering) so the high-D backend stays green (#47).
      - name: Configure (HNSW backend enabled)
        run: cmake --preset linux-gcc -DOPTICS_ENABLE_HNSW=ON

      - name: Build
        run: cmake --build --preset linux-gcc

      - name: Test
        run: ctest --preset linux-gcc

  perf-gate:
    name: Perf regression gate (back-to-back)
    runs-on: ubuntu-latest
    # Only on PRs: the gate compares the PR head against its base commit on the SAME runner,
    # back-to-back (perf/README.md: a stale committed baseline is unreliable -- run-to-run and
    # cross-machine variance swamp small deltas; only a same-machine back-to-back pair is meaningful).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the PR base commit reachable for the back-to-back build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build + run optics_perf at HEAD
        run: |
          cp tools/perf_gate.py /tmp/perf_gate.py   # keep the head version across the base checkout
          cmake -S . -B build-head -DCMAKE_BUILD_TYPE=Release -DOPTICS_BUILD_EXAMPLES=OFF
          cmake --build build-head --config Release --target optics_perf
          ( cd build-head && ./test/optics_perf )
          cp build-head/optics_perf.csv head.csv

      - name: Build + run optics_perf at the PR base
        run: |
          git checkout --detach ${{ github.event.pull_request.base.sha }}
          cmake -S . -B build-base -DCMAKE_BUILD_TYPE=Release -DOPTICS_BUILD_EXAMPLES=OFF
          cmake --build build-base --config Release --target optics_perf
          ( cd build-base && ./test/optics_perf )
          cp build-base/optics_perf.csv base.csv

      - name: Compare base vs head (gate the stable hot paths)
        # Gate the rock-solid hot path (core_dist, 10 epochs, #12) and the long-running dense-regime
        # end-to-end (stable due to its ~2.5 s runtime); the short 30-110 ms "ordering ..." rows are
        # printed for review but not gated, since shared-runner noise there can exceed the threshold.
        # Tolerance is deliberately generous (1.5x); a single spurious spike can be confirmed by re-run.
        run: python /tmp/perf_gate.py base.csv head.csv --tolerance 1.5 --only core_dist dense
